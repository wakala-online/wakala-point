<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <title>Omba Lipa Namba — Wakala Point</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter;background:#F4F6F8;color:#111;min-height:100vh}

    :root{
      --green:#1A9E5C;
      --green2:#127A44;
      --bg:#F4F6F8;
      --white:#fff;
      --border:#E5E7EB;
      --radius:14px;
      --shadow:0 2px 12px rgba(0,0,0,.08);
    }

    .header{
      position:fixed;top:0;left:0;right:0;height:60px;
      background:#fff;display:flex;align-items:center;justify-content:center;
      border-bottom:1px solid var(--border);
      font-weight:700;
    }

    .wrap{max-width:520px;margin:0 auto;padding:80px 16px 40px}

    .card{
      background:#fff;border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;margin-bottom:14px;
    }

    .title{font-size:12px;font-weight:700;color:#6B7280;margin-bottom:10px}

    /* TYPE */
    .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .type-btn{
      border:1.5px solid var(--border);
      padding:16px;border-radius:12px;
      cursor:pointer;background:#fff;font-weight:600
    }
    .type-btn.active{border-color:var(--green);background:#EAF7F0}

    /* OPTIONS */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .chip{
      border:1px solid var(--border);
      padding:12px;border-radius:10px;
      cursor:pointer;background:#fff;
      display:flex;justify-content:space-between
    }
    .chip.active{border-color:var(--green);background:#EAF7F0}

    .price{font-size:11px;font-weight:700;color:#127A44}

    /* FORM */
    input,select,textarea{
      width:100%;padding:10px;border:1px solid var(--border);
      border-radius:10px;font-family:Inter;font-size:14px
    }
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{font-size:12px;color:#6B7280;font-weight:600;margin-bottom:6px;display:block}
    .group{margin-bottom:12px}

    .btn{
      width:100%;padding:14px;border:none;
      background:var(--green);color:#fff;
      font-weight:700;border-radius:12px;
      cursor:pointer
    }

    .err{display:none;color:red;font-size:13px;margin-bottom:10px}
    .badge{
      display:none;
      margin-top:10px;
      padding:10px;
      background:#EAF7F0;
      border-radius:10px;
      font-size:13px;
      font-weight:600;
      color:#127A44;
    }

    .hide{display:none}
  </style>
</head>

<body>

<div class="header">Omba Lipa Namba</div>

<div class="wrap">

  <!-- STEP 1 -->
  <div class="card" id="step1">
    <div class="title">Hatua 1 — Chagua Aina</div>

    <div class="type-grid">
      <button class="type-btn" id="btn-net" onclick="show('net')">Lipa Namba</button>
      <button class="type-btn" id="btn-till" onclick="show('till')">Till Namba</button>
    </div>
  </div>

  <!-- NETWORK -->
  <div class="card hide" id="netBox">
    <div class="title">Chagua Mtandao</div>

    <div class="grid">
      <div class="chip" onclick="pick('Airtel',0,this)">Airtel <span class="price">Bure</span></div>
      <div class="chip" onclick="pick('Tigo/Yas',0,this)">Tigo/Yas <span class="price">Bure</span></div>
      <div class="chip" onclick="pick('Vodacom',0,this)">Vodacom <span class="price">Bure</span></div>
      <div class="chip" onclick="pick('Azam Pesa',5000,this)">Azam <span class="price">5,000</span></div>
      <div class="chip" onclick="pick('Halotel',5000,this)">Halotel <span class="price">5,000</span></div>
    </div>

    <div class="badge" id="badge"></div>
  </div>

  <!-- TILL -->
  <div class="card hide" id="tillBox">
    <div class="title">Chagua Till</div>

    <div class="grid">
      <div class="chip" onclick="pick('Till Airtel',3000,this)">Till Airtel <span class="price">3,000</span></div>
      <div class="chip" onclick="pick('Till Halotel',10000,this)">Till Halotel <span class="price">10,000</span></div>
      <div class="chip" onclick="pick('Till Vodacom',30000,this)">Till Vodacom <span class="price">30,000</span></div>
      <div class="chip" onclick="pick('Azam Till',10000,this)">Azam <span class="price">10,000</span></div>
    </div>

    <div class="badge" id="badge2"></div>
  </div>

  <!-- FORM -->
  <div class="card">
    <div class="title">Taarifa za Mwombaji</div>

    <div class="group">
      <label>Jina</label>
      <input id="jina">
    </div>

    <div class="row">
      <div class="group">
        <label>Simu</label>
        <input id="simu">
      </div>
      <div class="group">
        <label>Pili</label>
        <input id="simu2">
      </div>
    </div>

    <div class="group">
      <label>Biashara</label>
      <input id="biz">
    </div>

    <div class="err" id="err"></div>

    <button class="btn" onclick="submit()">Tuma Ombi</button>
  </div>

</div>

<script type="module" src="firebase-init.js"></script>
<script src="wakala.js"></script>

<script>
let type = "";
let packageName = "";
let price = 0;

function show(t){
  type = t;

  document.getElementById('netBox').classList.add('hide');
  document.getElementById('tillBox').classList.add('hide');

  document.getElementById('btn-net').classList.remove('active');
  document.getElementById('btn-till').classList.remove('active');

  if(t === "net"){
    document.getElementById('netBox').classList.remove('hide');
    document.getElementById('btn-net').classList.add('active');
  }

  if(t === "till"){
    document.getElementById('tillBox').classList.remove('hide');
    document.getElementById('btn-till').classList.add('active');
  }
}

function pick(name, p, el){
  packageName = name;
  price = p;

  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');

  const text = name + " - " + (p === 0 ? "Bure" : p.toLocaleString());

  if(type === "net"){
    const b = document.getElementById('badge');
    b.style.display = "block";
    b.innerText = text;
  } else {
    const b = document.getElementById('badge2');
    b.style.display = "block";
    b.innerText = text;
  }

  localStorage.setItem("package", name);
  localStorage.setItem("price", p);
}

async function submit(){

  const jina = document.getElementById('jina').value.trim();
  const simu = document.getElementById('simu').value.trim();
  const biz = document.getElementById('biz').value.trim();

  const err = document.getElementById('err');

  if(!jina || !simu || !biz){
    err.style.display = "block";
    err.innerText = "Jaza taarifa zote muhimu";
    return;
  }

  if(!packageName){
    err.style.display = "block";
    err.innerText = "Chagua package kwanza";
    return;
  }

  err.style.display = "none";

  const btn = document.querySelector('.btn');
  btn.disabled = true;
  btn.innerText = "Inatuma...";

  const data = {
    jina, simu, biz,
    package: packageName,
    price: price
  };

  try{
    const res = await submitRequest("lipa-namba", data);
    window.location.href = "ombi-detail.html?id=" + res.id;
  } catch(e){
    err.style.display = "block";
    err.innerText = "Hitilafu imejitokeza";
    btn.disabled = false;
    btn.innerText = "Tuma Ombi";
  }
}
</script>

</body>
</html>
