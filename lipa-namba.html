<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lipa Namba System</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;background:#1A9E5C;color:#fff}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:6px}
.hidden{display:none}
.error{color:red;font-size:13px}
.ok{color:green;font-size:13px}
</style>
</head>

<body>

<div class="card">
<h3>Chagua Lipa Namba</h3>

<button onclick="selectType('airtel')">Airtel</button>
<button onclick="selectType('tigo')">Tigo/Yas</button>
<button onclick="selectType('vodacom')">Vodacom</button>
<button onclick="selectType('azam')">Azam</button>
<button onclick="selectType('halotel')">Halotel</button>
<button onclick="selectType('till')">Till</button>
</div>

<div class="card" id="formBox"></div>

<script>
let type="";
let otpCode="";

function selectType(t){
type=t;
render();
}

function render(){
let box=document.getElementById("formBox");

if(type==="airtel"){
box.innerHTML=`
<h3>Airtel</h3>
<input id="phone" placeholder="Namba ya simu">
<input id="biz" placeholder="Jina la biashara (hiari)">
<button onclick="submitAirtel()">Tuma</button>
<div id="msg"></div>
`;
}

if(type==="tigo"){
box.innerHTML=`
<h3>Tigo/Yas OTP</h3>
<input id="phone" placeholder="Namba ya simu">
<button onclick="sendOTP()">Tuma OTP</button>
<div id="otpBox"></div>
<div id="msg"></div>
`;
}

if(type==="vodacom"){
box.innerHTML=`
<h3>Vodacom</h3>
<input id="name1" placeholder="Jina 1">
<input id="name2" placeholder="Jina 2">
<input id="name3" placeholder="Jina 3">
<input id="phone" placeholder="Simu">
<input id="nida" placeholder="NIDA">
<input type="file">
<button onclick="submitVodacom()">Tuma</button>
<div id="msg"></div>
`;
}

if(type==="azam"){
box.innerHTML=`
<h3>Azam Pesa</h3>
<input id="acc" placeholder="Account number">
<input id="nida" placeholder="NIDA">
<input id="biz" placeholder="Biashara (hiari)">
<input type="file">
<button onclick="submitAzam()">Tuma</button>
<div id="msg"></div>
`;
}

if(type==="halotel"){
box.innerHTML=`
<h3>Halotel</h3>
<input id="phone" placeholder="Namba ya simu">
<input id="nida" placeholder="NIDA">
<button onclick="submitHalotel()">Tuma</button>
<div id="msg"></div>
`;
}

if(type==="till"){
box.innerHTML=`
<h3>Till</h3>

<select id="tillType" onchange="tillRender()">
<option value="">Chagua</option>
<option value="airtel">Till Airtel</option>
<option value="halotel">Till Halotel</option>
<option value="vodacom">Till Vodacom</option>
</select>

<div id="tillBox"></div>
`;
}
}

function tillRender(){
let t=document.getElementById("tillType").value;
let box=document.getElementById("tillBox");

if(t==="airtel"){
box.innerHTML=`
<input placeholder="Namba ya simu">
<p>Wasiliana na TL 0698232313</p>
<button onclick="ok()">Tuma</button>
`;
}

if(t==="halotel"){
box.innerHTML=`
<input placeholder="Namba ya simu">
<select id="flot">
<option>Flot 100,000?</option>
<option>YES</option>
<option>NO</option>
</select>
<button onclick="checkFlot()">Endelea</button>
`;
}

if(t==="vodacom"){
box.innerHTML=`
<input placeholder="Namba ya simu">
<select id="scanner">
<option>Scanner?</option>
<option>YES</option>
<option>NO</option>
</select>
<button onclick="checkScanner()">Endelea</button>
`;
}
}

/* ================= OTP ================= */
function sendOTP(){
otpCode=Math.floor(100000+Math.random()*900000);
document.getElementById("otpBox").innerHTML=`
<input id="otpInput" placeholder="Weka OTP">
<button onclick="verifyOTP()">Thibitisha</button>
`;
alert("OTP: "+otpCode);
}

function verifyOTP(){
let input=document.getElementById("otpInput").value;
if(input==otpCode){
document.getElementById("msg").innerHTML="<span class='ok'>OTP Verified ✔</span>";
}else{
document.getElementById("msg").innerHTML="<span class='error'>OTP si sahihi</span>";
}
}

/* ================= RULES ================= */
function checkFlot(){
if(document.getElementById("flot").value!=="YES"){
alert("Flot ni lazima");
return;
}
alert("OK → TL 0698232313");
}

function checkScanner(){
if(document.getElementById("scanner").value!=="YES"){
alert("Scanner lazima uwe nayo");
return;
}
alert("OK → TL 0698232313");
}

/* ================= SUBMIT ================= */
function submitAirtel(){alert("Airtel submitted")}
function submitVodacom(){alert("Vodacom submitted")}
function submitAzam(){alert("Azam submitted")}
function submitHalotel(){alert("Halotel submitted")}
function ok(){alert("Submitted")}
</script>

</body>
</html>
