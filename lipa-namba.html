<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <title>Omba Lipa Namba — Wakala Point</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="icons-alipay.css">
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="wakala.css">
</head>
<body class="bg_surface_color">
  <div class="preload preload-container">
    <div class="preload-logo"><div class="spinner"></div></div>
  </div>

  <div class="header is-fixed">
    <div class="tf-container">
      <div class="tf-statusbar justify-content-center">
        <a href="index.html" class="back-btn"><i class="icon-left"></i></a>
        <h3>Omba Lipa Namba</h3>
      </div>
    </div>
  </div>

  <div id="app-wrap" style="padding-top:72px;padding-bottom:76px;">
    <div class="tf-container" style="padding:16px;">

      <!-- Info Box -->
      <div class="alert-info-box" style="display:flex;gap:8px;align-items:flex-start;">
        <i class="icon-info" style="flex-shrink:0;margin-top:2px;"></i>
        <span><strong>Lipa Namba</strong> ni namba ya kipekee inayokuwezesha kupokea malipo ya simu kwa biashara yako. Ni kama akaunti ya malipo ya kidijitali.</span>
      </div>

      <!-- Form -->
      <div style="background:#fff;border-radius:16px;padding:20px;box-shadow:var(--wakala-shadow);">
        <p class="section-title" style="margin-bottom:16px;display:flex;align-items:center;gap:6px;"><i class="icon-user-outline"></i> Taarifa za Mwombaji</p>

        <div class="group-input">
          <label>Jina Kamili *</label>
          <input type="text" id="f-jina" placeholder="Kama unavyoonekana kwenye kitambulisho">
        </div>
        <div class="group-input">
          <label>Namba ya Simu *</label>
          <input type="tel" id="f-simu" placeholder="+255 7XX XXX XXX">
        </div>
        <div class="group-input">
          <label>Namba ya Simu ya Pili (hiari)</label>
          <input type="tel" id="f-simu2" placeholder="+255 7XX XXX XXX">
        </div>
        <div class="group-input">
          <label>Aina ya Kitambulisho *</label>
          <select id="f-id-type">
            <option value="">-- Chagua --</option>
            <option>NIDA (Kitambulisho cha Taifa)</option>
            <option>Pasi (Passport)</option>
            <option>Leseni ya Dereva</option>
            <option>Voter ID</option>
          </select>
        </div>
        <div class="group-input">
          <label>Namba ya Kitambulisho *</label>
          <input type="text" id="f-id-no" placeholder="Namba ya kitambulisho">
        </div>

        <hr class="divider">
        <p class="section-title" style="margin-bottom:16px;display:flex;align-items:center;gap:6px;"><i class="icon-app-store"></i> Taarifa za Biashara</p>

        <div class="group-input">
          <label>Jina la Biashara *</label>
          <input type="text" id="f-biz-name" placeholder="Jina rasmi la biashara">
        </div>
        <div class="group-input">
          <label>Aina ya Biashara *</label>
          <select id="f-biz-type">
            <option value="">-- Chagua --</option>
            <option>Duka la rejareja</option>
            <option>Salon / Kinyozi</option>
            <option>Mkahawa / Mgahawa</option>
            <option>Duka la madawa</option>
            <option>Duka la nguo</option>
            <option>Gari / Usafiri</option>
            <option>Kilimo</option>
            <option>Elimu / Mafunzo</option>
            <option>Huduma za afya</option>
            <option>Nyingine</option>
          </select>
        </div>
        <div class="group-input">
          <label>Namba ya Usajili (BRELA / TRA)</label>
          <input type="text" id="f-reg-no" placeholder="Mfano: BRELA-2024-001">
        </div>

        <hr class="divider">
        <p class="section-title" style="margin-bottom:16px;display:flex;align-items:center;gap:6px;"><i class="icon-location"></i> Mahali pa Biashara</p>

        <div class="group-input">
          <label>Mkoa *</label>
          <select id="f-mkoa">
            <option value="">-- Chagua Mkoa --</option>
            <option>Dar es Salaam</option><option>Mwanza</option><option>Arusha</option>
            <option>Dodoma</option><option>Mbeya</option><option>Morogoro</option>
            <option>Tanga</option><option>Zanzibar</option><option>Kigoma</option>
            <option>Tabora</option><option>Lindi</option><option>Mtwara</option>
            <option>Singida</option><option>Shinyanga</option><option>Kagera</option>
            <option>Rukwa</option><option>Ruvuma</option><option>Iringa</option>
          </select>
        </div>
        <div class="group-input">
          <label>Wilaya *</label>
          <input type="text" id="f-wilaya" placeholder="Mfano: Ilala">
        </div>
        <div class="group-input">
          <label>Mtaa / Kata *</label>
          <input type="text" id="f-kata" placeholder="Mfano: Kariakoo">
        </div>
        <div class="group-input">
          <label>Mtandao wa Simu Unaotumia *</label>
          <select id="f-mtandao">
            <option value="">-- Chagua --</option>
            <option>M-Pesa (Vodacom)</option>
            <option>Tigopesa (Tigo)</option>
            <option>Airtel Money</option>
            <option>HaloPesa (Halotel)</option>
            <option>T-Pesa (TTCL)</option>
          </select>
        </div>

        <hr class="divider">
        <p class="section-title" style="margin-bottom:16px;display:flex;align-items:center;gap:6px;"><i class="icon-info"></i> Maelezo Zaidi</p>

        <div class="group-input">
          <label>Maelezo ya Ziada (hiari)</label>
          <textarea id="f-notes" rows="3" style="resize:none;font-size:14px;" placeholder="Yoyote unayotaka tuijue..."></textarea>
        </div>

        <p id="err-msg" style="color:var(--wakala-red);font-size:13px;display:none;margin-bottom:12px;"></p>

        <button class="tf-btn accent large" style="display:flex;align-items:center;justify-content:center;gap:8px;" onclick="submitLipaNamba()"><i class="icon-send"></i> Tuma Ombi</button>
      </div>

      <div style="height:20px;"></div>
    </div>
  </div>

  <script type="module" src="firebase-init.js"></script>
  <script src="jquery.min.js"></script>
  <script src="wakala.js"></script>
  <script src="main.js"></script>
  <script src="sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () { requireAuth(); });

    async function submitLipaNamba() {
      const f = (id) => document.getElementById(id).value.trim();
      const err = document.getElementById('err-msg');
      const btn = document.querySelector('button.tf-btn.accent.large');
      err.style.display = 'none';
      const required = [
        ['f-jina','Jina kamili'], ['f-simu','Namba ya simu'], ['f-id-type','Aina ya kitambulisho'],
        ['f-id-no','Namba ya kitambulisho'], ['f-biz-name','Jina la biashara'],
        ['f-biz-type','Aina ya biashara'], ['f-mkoa','Mkoa'], ['f-wilaya','Wilaya'],
        ['f-kata','Mtaa/Kata'], ['f-mtandao','Mtandao'],
      ];
      for (const [id, label] of required) {
        if (!f(id)) { err.textContent = `Tafadhali jaza: ${label}`; err.style.display='block'; document.getElementById(id).focus(); return; }
      }
      const details = {
        jina: f('f-jina'), simu: f('f-simu'), simu2: f('f-simu2'),
        aina_id: f('f-id-type'), namba_id: f('f-id-no'),
        jina_biashara: f('f-biz-name'), aina_biashara: f('f-biz-type'), namba_ya_biashara: f('f-reg-no'),
        mkoa: f('f-mkoa'), wilaya: f('f-wilaya'), kata: f('f-kata'), mtandao: f('f-mtandao'),
        maelezo: f('f-notes'),
      };
      if (btn) { btn.disabled = true; btn.textContent = 'Inatuma...'; }
      try {
        const req = await submitRequest('lipa-namba', details);
        window.location.href = `ombi-detail.html?id=${req.id}&new=1`;
      } catch (e) {
        err.textContent = 'Hitilafu imetokea. Tafadhali jaribu tena.';
        err.style.display = 'block';
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="icon-send"></i> Tuma Ombi'; }
      }
    }
  </script>
</body>
</html>
