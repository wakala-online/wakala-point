```html
<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wakala Point | Chat Support</title>

<link rel="stylesheet" href="bootstrap.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="wakala.css">
<link rel="stylesheet" href="icons-alipay.css">

<style>
body{
    margin:0;
    background:#f5f7fb;
    font-family:Inter,sans-serif;
}

.header{
    background:#D71920;
    color:#fff;
    padding:18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.header h2{
    margin:0;
    font-size:20px;
}

.online{
    font-size:12px;
    color:#b9ffbf;
}

.chat-area{
    height:calc(100vh - 145px);
    overflow-y:auto;
    padding:15px;
}

.message{
    margin-bottom:15px;
    display:flex;
}

.message.user{
    justify-content:flex-end;
}

.bubble{
    max-width:75%;
    padding:12px;
    border-radius:15px;
}

.user .bubble{
    background:#D71920;
    color:#fff;
}

.admin .bubble{
    background:#fff;
    border:1px solid #ddd;
}

.time{
    font-size:11px;
    margin-top:5px;
    opacity:.7;
}

.chat-input{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#fff;
    padding:12px;
    display:flex;
    gap:10px;
    box-shadow:0 -2px 10px rgba(0,0,0,.08);
}

.chat-input input{
    flex:1;
    border:1px solid #ddd;
    border-radius:30px;
    padding:12px;
    outline:none;
}

.chat-input button{
    background:#D71920;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    cursor:pointer;
}

.fab{
    position:fixed;
    bottom:90px;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#D71920;
    color:#fff;
    border:none;
    font-size:28px;
    cursor:pointer;
    box-shadow:0 5px 20px rgba(0,0,0,.25);
}
</style>

</head>

<body>

<div class="header">
<div>
<h2>Chat Support</h2>
<div class="online">🟢 Support Online</div>
</div>

<a href="index.html" style="color:white;text-decoration:none;">
🏠 Nyumbani
</a>
</div>

<div id="messages-container" class="chat-area">

<div class="message admin">
<div class="bubble">
Karibu Wakala Point 👋

Unaweza kuuliza swali lolote kuhusu huduma zetu.

<div class="time">09:30</div>
</div>
</div>

</div>

<div class="chat-input">

<input
id="msg-input"
type="text"
placeholder="Andika ujumbe..."
>

<button onclick="sendChatMessage()">
Tuma
</button>

</div>

<button class="fab" onclick="scrollToBottom()">
💬
</button>

<script type="module" src="firebase-init.js"></script>
<script src="wakala.js"></script>

<script>

function scrollToBottom(){
    const c=document.getElementById("messages-container");
    c.scrollTop=c.scrollHeight;
}

function sendChatMessage(){

    const input=document.getElementById("msg-input");

    if(input.value.trim()=="") return;

    const box=document.getElementById("messages-container");

    box.innerHTML+=`
    <div class="message user">
        <div class="bubble">
            ${input.value}
            <div class="time">
                ${new Date().toLocaleTimeString()}
            </div>
        </div>
    </div>
    `;

    input.value="";

    scrollToBottom();

    // Baadaye hapa utaunganisha Firebase
}

scrollToBottom();

</script>

</body>
</html>
```
